name: Sync TCGplayer prices

# Pulls Gundam market prices from tcgcsv into card_prices + card_price_history.
# tcgcsv refreshes daily ~20:00 UTC; we run every 2 days at 21:00 UTC (just after),
# which is plenty for a soft price reference. Also runnable on demand.

on:
  schedule:
    - cron: '0 21 */2 * *' # every 2 days, 21:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

# Don't let two runs overlap.
concurrency:
  group: sync-prices
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script deps
        working-directory: scripts
        run: npm ci

      - name: Sync prices
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:prices
